repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        pass_filenames: false
        always_run: true
        args: [ --config, res/config/ruff.toml, . ]
      - id: ruff
        pass_filenames: false
        always_run: true
        args: [ --config, res/config/ruff.toml, --fix, --exit-non-zero-on-fix, . ]
  - repo: local
    hooks:
      - id: block-sensitive-files
        name: Block Sensitive Files
        entry: ./ami/scripts/ci/block_sensitive_files.py
        language: system
      - id: check-dependency-versions
        name: Check Dependency Versions (strict pinning + latest)
        entry: ./ami/scripts/ci/check_dependency_versions.py
        language: system
        pass_filenames: false
        files: pyproject\.toml$
      - id: check-banned-words
        name: Check Banned Words
        entry: ./ami/scripts/ci/check_banned_words.py
        language: python
        additional_dependencies: [PyYAML]
        pass_filenames: false
      - id: check-file-length
        name: Check File Length (max 512 lines)
        entry: ./ami/scripts/ci/check_file_length.py
        language: python
        additional_dependencies: [PyYAML, pydantic]
        pass_filenames: false
      - id: check-init-files
        name: Enforce Empty __init__.py Files (CRITICAL SECURITY REQUIREMENT)
        entry: ./ami/scripts/ci/check_init_files.py
        language: system
        files: __init__\.py$
      - id: frontend-preflight
        name: Frontend Preflight
        entry: bash -c 'cd frontend && npm run preflight'
        language: system
        pass_filenames: false
        files: ^frontend/
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        args: [ --config-file, res/config/mypy.toml, --exclude, projects/, ami ]
        files: \.py$
        exclude: ^projects/
      - id: block-coauthored
        name: Block Co-authored Commits
        entry: ./ami/scripts/ci/block_coauthored.py
        language: system
        stages: [commit-msg]
  - repo: local
    hooks:
      - id: verify-coverage
        name: Verify Test Coverage (Unit >90%, Integration >75%)
        entry: ./ami/scripts/ci/verify_coverage.py
        language: system
        stages: [pre-push]
        pass_filenames: false


