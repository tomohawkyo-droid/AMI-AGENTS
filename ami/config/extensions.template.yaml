# AMI Agent Extensions - Single Source of Truth
# All commands are created as symlinks/wrappers in .boot-linux/bin/
#
# Each extension entry has:
#   - name: Command name (what you type in shell)
#   - binary: Path to the executable (relative to project root)
#   - description: Human-readable description (for banner display)
#   - category: core, enterprise, dev, infra, docs, or agents
#   - features: Comma-separated list of key features/flags
#   - hidden: true to hide from banner (optional)
#   - container: Docker container name for container-backed commands (optional)
#
# If binary ends with .py, a wrapper script is created that calls ami-run.
# Otherwise, a symlink is created directly.
#
# Run 'make register-extensions' to install all commands.

extensions:
  # ==========================================================================
  # Core Execution & Management
  # ==========================================================================
  - name: ami-agent
    binary: ami-agent
    description: AMI Orchestrator main entry point
    category: core
    features: --print, --interactive-editor, --query

  - name: ami
    binary: ami/scripts/bin/ami-run
    description: Unified CLI for services and system management
    category: core
    features: ansible, systemd, podman, status

  - name: ami-run
    binary: ami/scripts/bin/ami-run
    description: Universal project execution wrapper
    category: core
    features: python, uv, npm, npx, rustc, cargo, go

  - name: ami-repo
    binary: ami/scripts/bin/ami-repo
    description: Git repository and server management
    category: core
    features: git, gitlab-api, github-api, hf-api, status-all

  - name: ami-welcome
    binary: ami/scripts/bin/ami-welcome
    description: Print the AMI Orchestrator banner
    category: core
    hidden: true

  - name: ami-pwd
    binary: ami/scripts/bin/ami-pwd
    description: AMI root directory finder
    category: core
    features: find root, export AMI_ROOT
    hidden: true

  - name: ami-transcripts
    binary: ami/scripts/bin/ami_transcripts.py
    description: Transcript session management and search
    category: core
    features: list, show, search, replay, resume

  # ==========================================================================
  # Enterprise Services
  # ==========================================================================
  - name: ami-mail
    binary: ami/scripts/bin/ami_mail.py
    description: Enterprise mail operations CLI
    category: enterprise
    features: send, send-block, fetch

  - name: ami-chat
    binary: .boot-linux/bin/matrix-commander
    description: Matrix CLI chat (matrix-commander)
    category: enterprise
    features: --message, --room, --listen, --tail

  - name: ami-synadm
    binary: .boot-linux/bin/synadm
    description: Matrix Server Admin CLI (synadm)
    category: enterprise
    features: user, room, media, version

  - name: ami-kcadm
    binary: ami/scripts/bin/ami-kcadm
    description: Keycloak Admin CLI (kcadm.sh)
    category: enterprise
    features: config, get, create, update, delete
    container: ami-keycloak

  - name: ami-browser
    binary: .venv/bin/playwright
    description: Browser automation (Playwright)
    category: enterprise
    features: open, codegen, screenshot, pdf, install

  # ==========================================================================
  # Development Tools
  # ==========================================================================
  - name: ami-backup
    binary: ami/scripts/backup/create/main.py
    description: Backup (rsync snapshots / Google Drive)
    category: dev
    features: --mode, --target, --keep-local, --dry-run

  - name: ami-restore
    binary: ami/scripts/backup/restore/main.py
    description: Restore from snapshots or archives
    category: dev
    features: --latest-snapshot, --snapshot, --file-id, --latest-local

  - name: ami-gcloud
    binary: .gcloud/google-cloud-sdk/bin/gcloud
    description: Google Cloud CLI (gcloud SDK)
    category: dev
    features: compute, storage, iam, config

  - name: ami-kubectl
    binary: .boot-linux/bin/kubectl
    description: Kubernetes CLI (kubectl + helm)
    category: dev
    features: get, apply, logs, describe, helm

  - name: ami-cron
    binary: ami/scripts/bin/ami_cron.py
    description: AMI-aware cron job management
    category: dev
    features: list, add, remove, edit, status

  # ==========================================================================
  # Infrastructure & Networking (hidden by default)
  # ==========================================================================
  - name: ami-ssh
    binary: ami/scripts/bin/ami_ssh.py
    description: SSH with AMI keys and config
    category: infra
    features: auto-keys, project .ssh/, openssh
    hidden: true

  - name: ami-vpn
    binary: ami/scripts/bin/run_openvpn_client.py
    description: OpenVPN client with AMI config
    category: infra
    features: --ovpn-file, --action start/health, --daemon
    hidden: true

  - name: ami-tunnel
    binary: ami/scripts/bin/ami_tunnel.py
    description: Cloudflare tunnel management
    category: infra
    features: tunnel, access, login, service
    hidden: true

  - name: ami-ssl
    binary: ami/scripts/bin/ami_ssl.py
    description: OpenSSL with AMI cert paths
    category: infra
    features: x509, req, genrsa, s_client, verify
    hidden: true

  # ==========================================================================
  # Document Production
  # ==========================================================================
  - name: ami-docs
    binary: ami/scripts/bin/ami_docs.py
    description: Document conversion and PDF generation
    category: docs
    features: pandoc, wkhtmltopdf, pdflatex, xelatex, pdfjam

  # ==========================================================================
  # AI Coding Agents (REQUIRE HUMAN SUPERVISION)
  # ==========================================================================
  - name: ami-claude
    binary: .venv/node_modules/.bin/claude
    description: Claude Code AI assistant
    category: agents
    features: -p, --continue, --resume, --allowedTools

  - name: ami-gemini
    binary: .venv/node_modules/.bin/gemini
    description: Gemini CLI AI assistant
    category: agents
    features: -p, --resume, --yolo, mcp, extensions

  - name: ami-qwen
    binary: .venv/node_modules/.bin/qwen
    description: Qwen Code AI assistant
    category: agents
    features: -p, --resume, --yolo, mcp, extensions
