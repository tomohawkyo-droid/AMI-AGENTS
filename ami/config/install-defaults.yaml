# Default components to install in CI/non-interactive mode
# Used by: make install-ci
# Edit this file to change which components are installed by default
#
# NOTE: Only include components that can install without external dependencies
# (no Node.js, no pip packages, etc.)

components:
  # Core Dependencies (installed FIRST)
  - uv

  # Development Tools (system packages, usually pre-installed)
  - git
  - go

  # Containers & Orchestration
  - podman

  # Security & Networking
  - openssh
  - openssl

  # Miscellaneous
  - ansible
