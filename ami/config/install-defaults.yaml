# Default components to install in CI/non-interactive mode
# Used by: make install-ci
# Edit this file to change which components are installed by default
#
# NOTE: Only include components that bootstrap from direct downloads.
# System dependencies (git, openssh, openssl, openvpn) are checked by pre-req.sh
# and installed via: sudo make pre-req

components:
  # Core Dependencies (installed FIRST)
  - uv
  - python

  # AI Coding Assistants
  - claude
  - gemini
  - qwen

  # Containers & Orchestration
  - podman

  # Development Tools
  - gh
  - go

  # Security & Networking
  - cloudflared

  # Document Processing
  - pandoc
  - texlive

  # Miscellaneous
  - adb
  - ansible
