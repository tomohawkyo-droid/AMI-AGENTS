# Bash Command Validation Patterns
# Used by CommandValidator in agents/ami/hooks.py
#
# These patterns define forbidden bash commands and operators that should be blocked
# in favor of Claude Code's dedicated tools or approved wrappers.

version: "1.0.0"

deny_patterns:
  # Inline python execution - BLOCK FIRST (more specific than general python block)
  - pattern: '\bpython3?\s+-c\b'
    message: "Inline python execution forbidden - bypasses code quality validation. Write scripts instead"

  - pattern: '\|\s*python3?\b'
    message: "Piping to python forbidden - bypasses code quality validation. Write scripts instead"

  - pattern: '\bpip3?\b'
    message: "Add to pyproject.toml and use uv sync"

  - pattern: '(?<!ami-)\bruff\b'
    message: "Use scripts/git-commit with --fix instead of direct ruff - pre-commit checks handle linting"

  # Git operations - use approved scripts or forbidden entirely
  - pattern: '--no-verify'
    message: "Git hook bypass forbidden"
  - pattern: '--no-verify'
    message: "Git hook bypass forbidden"

  - pattern: '\bgit\s+commit\b(?!-)'
    message: "Use scripts/git-commit"

  - pattern: '\bgit\b.*\bpush\b'
    message: "Use scripts/git-push"

  - pattern: '\bgit\b.*\brestore\b'
    message: "Git restore forbidden - modifies staging/working tree"

  - pattern: '\bgit\b.*\breset\b'
    message: "Git reset forbidden - modifies HEAD/staging/working tree"

  - pattern: '\bgit\b.*\bcheckout\b'
    message: "Git checkout forbidden - modifies working tree"

  - pattern: '^\s*cd\b'
    message: "Use absolute paths or cwd parameter - scripts like git-commit take module paths as arguments"

  - pattern: '\bgit\b.*\bpull\b'
    message: "Git pull forbidden - modifies working tree"

  - pattern: '\bgit\b.*\brebase\b'
    message: "Git rebase forbidden - rewrites history"

  - pattern: '\bgit\b.*\bmerge\b'
    message: "Git merge forbidden - modifies working tree"

  - pattern: '\bgit\b.*\brm\b.*--cached'
    message: "Git rm --cached forbidden - removes files from git index"

  # Shell operators - use separate Bash calls or dedicated tools
  # NOTE: Check && before & to avoid false matches (second & in && would match &(?!&))
  - pattern: '&&'
    message: "Use separate Bash calls instead of &&"

  - pattern: '&(?!&)'
    message: "Use run_in_background parameter instead of &"

  - pattern: ';'
    message: "Use separate Bash calls instead of ;"

  - pattern: '\|\|'
    message: "Use separate Bash calls instead of ||"

  # Text processing - use Claude Code tools
  - pattern: '\bawk\b'
    message: "Text processing via awk is forbidden"

  - pattern: '\bsed\b'
    message: "Write operations are not permitted"

  - pattern: '\becho\b'
    message: "Write operations are not permitted"

  - pattern: '\bcat\b'
    message: "Use read_file tool instead of cat"

  # Network operations
  - pattern: '\bwget\b'
    message: "Use Read/WebFetch tools instead of wget"

  # Node.js operations
  - pattern: '\bnode\b'
    message: "Use nodes launcher for Node.js operations"

  # Process management - use KillShell tool
  - pattern: '\bpkill\b'
    message: "Use KillShell tool for background process management"

  - pattern: '\bkill\b'
    message: "Use KillShell tool for background process management"

  - pattern: '\bkillall\b'
    message: "Use KillShell tool for background process management"

  # Shell invocations - Prevent nested shells
  - pattern: '\bbash\b'
    message: "Direct shell invocation forbidden - use specific tools"

  - pattern: '\bsh\b'
    message: "Direct shell invocation forbidden - use specific tools"

  - pattern: '\bzsh\b'
    message: "Direct shell invocation forbidden - use specific tools"

  - pattern: '\bksh\b'
    message: "Direct shell invocation forbidden - use specific tools"

  - pattern: '\bcsh\b'
    message: "Direct shell invocation forbidden - use specific tools"

  - pattern: '\bdash\b'
    message: "Direct shell invocation forbidden - use specific tools"

  # System security
  - pattern: '\bami\s+'
    message: "Direct use of ami command forbidden"

  - pattern: '\bsudo\b'
    message: "Sudo commands not allowed (except in approved scripts)"

  - pattern: '(?<!--)\bchmod\b'
    message: "File permission changes not allowed (git update-index --chmod is allowed)"

  - pattern: '\bchown\b'
    message: "File ownership changes not allowed"

  # Dangerous filesystem operations
  - pattern: '\brm\b'
    message: "Use Delete/FileSys tools instead of rm - permanent deletion is restricted"

  - pattern: '\bmv\b'
    message: "Use FileSys/Edit tools instead of mv"

  - pattern: '\bcp\b'
    message: "Use FileSys/Write tools instead of cp"

  - pattern: '\bdd\b'
    message: "Low-level disk operations forbidden"

  - pattern: '\bshred\b'
    message: "Secure deletion forbidden"

  - pattern: '\bwipe\b'
    message: "Secure deletion forbidden"