extensions:
  - name: ami-claude
    binary: .venv/node_modules/.bin/claude
    description: Claude Code AI assistant
    category: agents
    features:
      - -p
      - --continue
      - --resume
      - --allowedTools
    bannerPriority: 500
    minVersion: "2.0.0"
    check:
      command: ["{binary}", "--version"]
      versionPattern: "(\\d+\\.\\d+\\.\\d+)"
      healthExpect: "Claude Code"
      timeout: 5

  - name: ami-gemini
    binary: .venv/node_modules/.bin/gemini
    description: Gemini CLI AI assistant
    category: agents
    features:
      - -p
      - --resume
      - --yolo
      - mcp
      - extensions
    bannerPriority: 510
    minVersion: "0.30.0"
    check:
      command: ["{binary}", "--version"]
      versionPattern: "(\\d+\\.\\d+\\.\\d+)"
      healthExpect: ""
      timeout: 5

  - name: ami-qwen
    binary: .venv/node_modules/.bin/qwen
    description: Qwen Code AI assistant
    category: agents
    features:
      - -p
      - --resume
      - --yolo
      - mcp
      - extensions
    bannerPriority: 520
    minVersion: "0.10.0"
    check:
      command: ["{binary}", "--version"]
      versionPattern: "(\\d+\\.\\d+\\.\\d+)"
      healthExpect: ""
      timeout: 5
