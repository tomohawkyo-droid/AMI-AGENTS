extensions:
  - name: ami-cron
    binary: ami/scripts/bin/ami_cron.py
    description: AMI-aware cron job management
    category: dev
    features:
      - list
      - add
      - remove
      - edit
      - status
    bannerPriority: 240
    check:
      command: ["{python}", "{binary}", "--help"]
      healthExpect: "cron"
      timeout: 5
