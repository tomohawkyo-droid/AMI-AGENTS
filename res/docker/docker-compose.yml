version: '3.8'

# Unified AMI Orchestrator Compose File
# Use profiles to manage service groups:
#   - data: Core databases and monitoring (manual start)
#   - secrets: Secrets management (OpenBao, Vaultwarden, OpenVPN)
#   - dev: Development tools (SearXNG)

services:
  # --- Data Profile ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ami-postgres
    profiles: ["data"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 15s
      timeout: 20s
      retries: 40

  redis:
    image: redis:8.4.0
    container_name: ami-redis
    profiles: ["data"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 40

  dgraph:
    image: dgraph/standalone:v25.1.0
    container_name: ami-dgraph
    profiles: ["data"]
    environment:
      DGRAPH_ALPHA_SECURITY: whitelist=0.0.0.0/0
    ports:
      - "${DGRAPH_HTTP_PORT:-8081}:8080"
      - "${DGRAPH_GRPC_PORT:-9081}:9080"
    volumes:
      - dgraphdata:/dgraph

  mongo:
    image: mongo:8.2.2
    container_name: ami-mongo
    profiles: ["data"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-x}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-x}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 10s
      retries: 30

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: ami-prometheus
    profiles: ["data"]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - prometheusdata:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 30

  # --- Secrets Profile ---
  openbao:
    image: docker.io/openbao/openbao:2.4.4
    container_name: ami-openbao
    profiles: ["secrets"]
    command:
      - server
      - -dev
      - -dev-root-token-id=${OPENBAO_DEV_ROOT_TOKEN_ID}
      - -dev-listen-address=0.0.0.0:8200
    environment:
      BAO_LOG_LEVEL: ${OPENBAO_LOG_LEVEL:-info}
    ports:
      - "${OPENBAO_PORT:-8200}:8200"

  # --- Dev Profile ---
  searxng:
    image: searxng/searxng:2025.12.17-896863802
    container_name: ami-searxng
    profiles: ["dev"]
    depends_on:
      - searxng-redis
    environment:
      BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:8888}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me}
      REDIS_URL: ${SEARXNG_REDIS_URL:-redis://127.0.0.1:6379/0}
      LIMITER: ${SEARXNG_LIMITER:-true}
    network_mode: host
    volumes:
      - ./launcher/config/searxng/settings.yml:/etc/searxng/settings.yml:ro,z

  searxng-redis:
    image: redis:8.4.0
    container_name: ami-searxng-redis
    profiles: ["dev"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    network_mode: host
    volumes:
      - searxng_redis_data:/data:z

  vaultwarden:
    image: vaultwarden/server:1.34.3
    container_name: ami-vaultwarden
    profiles: ["secrets"]
    environment:
      DOMAIN: ${VAULTWARDEN_DOMAIN:-http://127.0.0.1:${VAULTWARDEN_PORT:-8083}}
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8083
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      INVITATIONS_ALLOWED: ${VAULTWARDEN_INVITATIONS_ALLOWED:-false}
      WEBSOCKET_ENABLED: ${VAULTWARDEN_WEBSOCKET_ENABLED:-true}
    network_mode: host
    volumes:
      - vaultwarden_data:/data:z

  openvpn:
    image: ghcr.io/linuxserver/openvpn-as:2.13.1
    container_name: ami-openvpn
    profiles: ["secrets"]
    cap_add:
      - NET_ADMIN
    environment:
      PUID: ${OPENVPN_PUID:-1000}
      PGID: ${OPENVPN_PGID:-1000}
      TZ: ${OPENVPN_TZ:-UTC}
      INTERFACE: ${OPENVPN_INTERFACE:-eth0}
    network_mode: host
    volumes:
      - openvpn_config:/config:z

volumes:
  pgdata:
  redisdata:
  dgraphdata:
  mongodata:
  prometheusdata:
  searxng_redis_data:
  vaultwarden_data:
  openvpn_config:
