# Global options
[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
# NO CHEATING. All typing rules enforced.
warn_unused_configs = true
exclude = [
    "(?x)(^tmp/|^.venv/|^venv/|^dist/|^build/|^.eggs/|^__pycache__/|.*\\.egg-info/|^.pytest_cache/|^.git/|^projects/)"
]

# NO CHEATING FOR TESTS. Tests must have proper types too.

[[tool.mypy.overrides]]
module = "sklearn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "matplotlib.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "seaborn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tqdm.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "fitz.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "psutil.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "boto3.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "botocore.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "questionary"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "questionary.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "rich.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "transformers.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "datasets.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "accelerate.*"
ignore_missing_imports = true

# External Google API libraries - missing type stubs only
[[tool.mypy.overrides]]
module = ["googleapiclient", "googleapiclient.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["google_auth_oauthlib", "google_auth_oauthlib.*"]
ignore_missing_imports = true

# Google auth libraries have incomplete type annotations (py.typed but untyped functions)
# See: https://github.com/googleapis/google-auth-library-python/issues/1567
[[tool.mypy.overrides]]
module = ["google.auth", "google.auth.*"]
ignore_missing_imports = true
disallow_untyped_calls = false

[[tool.mypy.overrides]]
module = ["google.oauth2", "google.oauth2.*"]
ignore_missing_imports = true
disallow_untyped_calls = false

# Google auth caller — google.auth has incomplete type annotations
[[tool.mypy.overrides]]
module = "ami.scripts.backup.common.auth"
disallow_untyped_calls = false

# NO CHEATING FOR OUR OWN CODE. Fix the types.

# Technical Analysis library - no type stubs available
[[tool.mypy.overrides]]
module = "ta.*"
ignore_missing_imports = true

# MLflow - incomplete type stubs, dynamic API
[[tool.mypy.overrides]]
module = "mlflow.*"
ignore_missing_imports = true

# UUID utilities - time-ordered UUID7 implementation
[[tool.mypy.overrides]]
module = "uuid_utils.*"
ignore_missing_imports = true

# Aho-Corasick - C extension, no type annotations
[[tool.mypy.overrides]]
module = "ahocorasick.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "ahocorasick"
ignore_missing_imports = true

# Intel XPU - dynamic module only available with IPEX
[[tool.mypy.overrides]]
module = "torch.xpu.*"
ignore_missing_imports = true
ignore_errors = true

