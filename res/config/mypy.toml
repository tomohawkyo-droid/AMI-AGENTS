# Global options
[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
# NO CHEATING. All typing rules enforced.
warn_unused_configs = true
# PEP 420 namespace package support (ami has no __init__.py)
namespace_packages = true
explicit_package_bases = true
mypy_path = ".:projects/AMI-CI"
exclude = [
    "(?x)(^tmp/|^.venv/|^venv/|^dist/|^build/|^.eggs/|^__pycache__/|.*\\.egg-info/|^.pytest_cache/|^.git/|^projects/|^\\.boot-linux/)"
]

# NO CHEATING FOR TESTS. Tests must have proper types too.

[[tool.mypy.overrides]]
module = "sklearn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "matplotlib.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "seaborn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tqdm.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "fitz.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "psutil.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "boto3.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "botocore.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "questionary"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "questionary.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "rich.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "transformers.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "datasets.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "accelerate.*"
ignore_missing_imports = true

# External Google API libraries - missing type stubs only
[[tool.mypy.overrides]]
module = ["googleapiclient", "googleapiclient.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["google_auth_oauthlib", "google_auth_oauthlib.*"]
ignore_missing_imports = true

# Google auth libraries have incomplete type annotations (py.typed but untyped functions)
# See: https://github.com/googleapis/google-auth-library-python/issues/1567
[[tool.mypy.overrides]]
module = ["google.auth", "google.auth.*"]
ignore_missing_imports = true
disallow_untyped_calls = false

[[tool.mypy.overrides]]
module = ["google.oauth2", "google.oauth2.*"]
ignore_missing_imports = true
disallow_untyped_calls = false

# Google auth caller - external library has incomplete type stubs
[[tool.mypy.overrides]]
module = "ami.scripts.backup.common.auth"
disallow_untyped_calls = false

# NO CHEATING FOR OUR OWN CODE. Fix the types.

# rust-ta PyO3 bindings — compiled .so with no py.typed marker
[[tool.mypy.overrides]]
module = ["rust_ta", "rust_ta.*"]
ignore_missing_imports = true
follow_untyped_imports = true

# MLflow - incomplete type stubs, dynamic API
[[tool.mypy.overrides]]
module = "mlflow.*"
ignore_missing_imports = true

# UUID utilities - time-ordered UUID7 implementation
[[tool.mypy.overrides]]
module = "uuid_utils.*"
ignore_missing_imports = true

# Aho-Corasick - C extension, no type annotations
[[tool.mypy.overrides]]
module = "ahocorasick.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "ahocorasick"
ignore_missing_imports = true

# PyTorch - optional dependency, not always installed
[[tool.mypy.overrides]]
module = "torch"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "torch.*"
ignore_missing_imports = true

# Intel XPU - dynamic module only available with IPEX
[[tool.mypy.overrides]]
module = "torch.xpu.*"
ignore_missing_imports = true

# ONNX Runtime optimum - optional ML dependency
[[tool.mypy.overrides]]
module = ["optimum", "optimum.*"]
ignore_missing_imports = true

# Dgraph client - no type stubs or py.typed marker
[[tool.mypy.overrides]]
module = ["pydgraph", "pydgraph.*"]
ignore_missing_imports = true

# asyncpg - no type stubs or py.typed marker
[[tool.mypy.overrides]]
module = ["asyncpg", "asyncpg.*"]
ignore_missing_imports = true

# PyYAML - install types-PyYAML or ignore
[[tool.mypy.overrides]]
module = "yaml"
ignore_missing_imports = true

# OpenBao vault client (via hvac) - optional dependency
[[tool.mypy.overrides]]
module = ["hvac", "hvac.*"]
ignore_missing_imports = true

# FastAPI - installed per-project, not in global venv
[[tool.mypy.overrides]]
module = ["fastapi", "fastapi.*"]
ignore_missing_imports = true

# Prefect - workflow orchestration, installed per-project
[[tool.mypy.overrides]]
module = ["prefect", "prefect.*"]
ignore_missing_imports = true

# httpx - async HTTP client
[[tool.mypy.overrides]]
module = ["httpx", "httpx.*"]
ignore_missing_imports = true

# aiohttp - async HTTP client/server
[[tool.mypy.overrides]]
module = ["aiohttp", "aiohttp.*"]
ignore_missing_imports = true

# pandas - data manipulation (use pandas-stubs when available)
[[tool.mypy.overrides]]
module = ["pandas", "pandas.*"]
ignore_missing_imports = true

# tabulate - table formatting
[[tool.mypy.overrides]]
module = "tabulate"
ignore_missing_imports = true

# SQLAlchemy - ORM/database toolkit
[[tool.mypy.overrides]]
module = ["sqlalchemy", "sqlalchemy.*"]
ignore_missing_imports = true

# bcrypt + PyJWT - auth dependencies
[[tool.mypy.overrides]]
module = ["bcrypt", "jwt", "jwt.*"]
ignore_missing_imports = true

# Pydantic - strict mode handles typing, ignore stubs
[[tool.mypy.overrides]]
module = ["pydantic", "pydantic.*"]
ignore_missing_imports = true

# Loguru - structured logging
[[tool.mypy.overrides]]
module = "loguru"
ignore_missing_imports = true

# Intel IPEX - optional CPU optimization
[[tool.mypy.overrides]]
module = "intel_extension_for_pytorch"
ignore_missing_imports = true

# Modules subclassing torch.nn.Module (Any when torch stubs missing)
[[tool.mypy.overrides]]
module = [
    "src.models.*",
    "src.training.loss",
    "src.data.processing.loader",
    "src.types.data",
]
disallow_subclassing_any = false
disallow_untyped_decorators = false

# FastAPI/Prefect decorators produce untyped wrappers when stubs unavailable
[[tool.mypy.overrides]]
module = [
    "src.delivery.api.*",
    "src.core.tasks",
]
disallow_untyped_decorators = false

# Functions returning library types that resolve to Any
[[tool.mypy.overrides]]
module = [
    "src.core.security",
    "src.utils.device",
    "src.evaluation.autoregressive",
    "src.training.trainer",
    "src.data.execution.worker",
]
warn_return_any = false

