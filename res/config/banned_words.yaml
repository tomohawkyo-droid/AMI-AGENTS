# Banned Word Patterns Configuration v3.1.0
# Consolidated from agents/ and AMI-TRADING/ repositories
#
# Format:
#   pattern: regex pattern to match
#   reason: why this pattern is banned
#   exception_regex: (optional) regex for filepaths to exclude from this rule
#   multiline: (optional) true for patterns spanning multiple lines
#
# Test files (tests/) have specific exemptions for testing utilities.

version: "3.0.0"

banned:
  # === LINTER/TYPE SUPPRESSION ===
  - pattern: 'mypy: ignore-errors'
    reason: "Global mypy ignores forbidden. Fix the types."

  - pattern: '#\s*type:\s*ignore'
    reason: "Type ignoring forbidden. Fix the code or architecture."

  - pattern: '#\s*noqa'
    reason: "Linter suppression forbidden. Fix the code style."

  # === FORBIDDEN COMPLEX TYPES ===
  # Use TypedDict/NamedTuple/Pydantic for data structures.
  # Exception: CI scripts need internal caches with dynamic keys for performance
  # Exception: types/common.py ContainerLabels needs dict[str, str] for arbitrary Docker labels
  - pattern: '\b(Dict|Tuple|dict|tuple|frozenset)\['
    reason: "BANNED. Use TypedDict/NamedTuple/Pydantic."
    exception_regex: "(scripts/ci/|types/common\\.py)"

  # Exception: subprocess interface files need Mapping for Popen env parameter
  - pattern: '\b(Mapping|Sequence|MutableMapping|MutableSequence|Iterable|Iterator)\['
    reason: "BANNED. Use TypedDict/NamedTuple/Pydantic."
    exception_regex: "(utils/process\\.py|cli/process_utils\\.py)"

  - pattern: '\b(List|Set|list|set)\[(?!\s*[''"]?[a-zA-Z0-9_.]+(\[[a-zA-Z0-9_.]+\])?[''"]?\s*\]).*\]'
    reason: "BANNED. Use simple list[Type] or list[Type[T]] only."

  # === UNSAFE TYPING ===
  - pattern: 'dict\[.*,\s*Any\]'
    reason: "No generic dicts for structured data. Use Pydantic models."
    exception_regex: "(tests/|scripts/ci/check_banned_words\\.py|scripts/ci/check_dependency_versions\\.py)"

  - pattern: ':\s*Any\b'
    reason: "Explicit Any forbidden. Use proper types."
    exception_regex: "tests/"

  # === CODE OWNERSHIP ===
  - pattern: '(?i)co-authored-by'
    reason: "Co-authored attribution forbidden. Own your code."
    exception_regex: "(scripts/ci/block_coauthored\\.py|tests/unit/ci/test_block_coauthored\\.py)"

  # === LEGACY/FALLBACK CODE ===
  - pattern: '\bfallback\b'
    reason: "No fallback code. Fix properly or fail explicitly."
    exception_regex: "tests/"

  - pattern: '\bfalling\b'
    reason: "Avoid 'falling back' patterns."

  - pattern: '\bbackwards\b'
    reason: "No backwards compatibility hacks."

  - pattern: '\bcompatibility\b'
    reason: "No compatibility shims."

  - pattern: '\bdegradation\b'
    reason: "No graceful degradation. Fail fast."

  - pattern: '\blegacy\b'
    reason: "No legacy code paths."

  - pattern: '\bshims?\b'
    reason: "No shim layers."

  - pattern: '\bstubs?\b'
    reason: "No stub implementations."
    exception_regex: "tests/"

  - pattern: '\bskeleton\b'
    reason: "No skeleton code."

  - pattern: '\bplaceholders?\b'
    reason: "No placeholder code."

  - pattern: '\bmock\b'
    reason: "No mock objects in production code."
    exception_regex: "(tests/|frontend/src/test/)"

  - pattern: '\blazy\b'
    reason: "No lazy evaluation hacks."

  - pattern: '\bmaybe\b'
    reason: "No uncertain code paths."

  # === SUPPRESSION PATTERNS ===
  - pattern: '\.suppress'
    reason: "No suppression of errors/warnings."
    exception_regex: "tests/"

  # === UNSAFE REFLECTION ===
  - pattern: '(?<!tc)getattr\('
    reason: "getattr is unsafe. Use explicit attribute access."
    exception_regex: "tests/"

  - pattern: '(?<!tc)setattr\('
    reason: "setattr is unsafe. Use explicit attribute assignment."
    exception_regex: "tests/"

  - pattern: '\bhasattr\('
    reason: "hasattr is unsafe. Use explicit checks or protocols."
    exception_regex: "tests/"

  - pattern: '\.__dict__'
    reason: "Direct __dict__ access forbidden. Use proper interfaces."

  - pattern: '\bvars\('
    reason: "vars() is unsafe reflection."

  - pattern: '\bimportlib\b'
    reason: "Dynamic imports forbidden. Use explicit imports."

  # === DATA CLASSES ===
  - pattern: '@dataclass'
    reason: "Use Pydantic models instead of dataclasses."

  # === PATH SAFETY ===
  - pattern: '/home/'
    reason: "No hardcoded home paths. Use environment variables."

  - pattern: '\.parent\.parent'
    reason: "Fragile path navigation. Use explicit paths."

  - pattern: '\.parents\['
    reason: "Fragile path navigation. Use explicit paths."

  - pattern: '\.parent\.resolve'
    reason: "Fragile path navigation. Use explicit paths."

  # === UUID (only uuid7 allowed) ===
  - pattern: 'uuid\.uuid[134568]\('
    reason: "Only uuid7 allowed. Use uuid_utils.uuid7()."

  - pattern: '\buuid[134568]\(\)'
    reason: "Only uuid7 allowed. Use uuid_utils.uuid7()."

  # === CONTAINER VERSIONS ===
  - pattern: ':latest\b'
    reason: "Pin container versions. No :latest tags."

  # === SELF METHOD PATTERNS ===
  - pattern: 'self\.get\('
    reason: "Avoid dict-like self.get(). Use explicit attributes."

  - pattern: 'self\.set\('
    reason: "Avoid dict-like self.set(). Use explicit attributes."

  # === SPECIAL CHARACTERS ===
  - pattern: '—'
    reason: "No em-dashes. Use -- or proper formatting."

directory_rules:
  tests:
    # Hardware-specific tests may need conditional skipping
    # Only ban explicit "not implemented" placeholders
    - pattern: 'reason=.*not implemented yet'
      reason: "Implement the test or delete it."

filename_rules:
  - pattern: '_v[0-9]+'
    reason: "No versioned filenames. Use git."

  - pattern: '_old\.'
    reason: "No _old files. Delete or rename properly."

  - pattern: '_new\.'
    reason: "No _new files. Rename to final name."

  - pattern: '_fixed\.'
    reason: "No _fixed files. Replace original."

  - pattern: '_temp\.'
    reason: "No temp files in repo."

  - pattern: '_tmp\.'
    reason: "No tmp files in repo."

  - pattern: '_backup\.'
    reason: "No backup files. Use git."

  - pattern: '_copy\.'
    reason: "No copy files. Consolidate."

  - pattern: '_final\.'
    reason: "No _final files. Just use the real name."

  - pattern: '\.(old|new|backup|bak|orig)$'
    reason: "No backup extensions. Use git."

