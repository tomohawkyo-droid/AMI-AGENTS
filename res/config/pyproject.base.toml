[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "universal-project-template"
version = "0.1.0"
description = "Universal Python project template with comprehensive tooling"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "Development Team", email = "dev@example.com"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
requires-python = "==3.11.*"
dependencies = [
    "pydantic==2.12.5",
    "pydantic-settings==2.12.0",
    "python-dotenv==1.2.1",
    "loguru==0.7.3",
    "click==8.3.1",
    "pyyaml==6.0.3",
    "setuptools",
# VENDOR_DEPENDENCIES_PLACEHOLDER
]

[project.optional-dependencies]
dev = [
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "pre-commit==4.5.1",
    "black==25.12.0",
    "ruff==0.14.10",
    "mypy==1.19.1",
    "httpx==0.28.1",
    "types-requests==2.32.4.20250913",
    "types-setuptools==80.9.0.20251223",
    "types-PyYAML==6.0.12.20250915",
    "types-tqdm==4.67.0.20250809",
    "pandas-stubs==2.3.3.251219",
]

[project.scripts]
universal-project = "src.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "ami*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "integration: marks tests as integration tests (requires live stack)",
]
norecursedirs = ["tmp", "build", "dist", "node_modules"]

[tool.ruff]
exclude = ["__pycache__", "*.egg-info", ".venv", ".git", "node_modules", ".pytest_cache"]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E", "F", "W", "I", "C", "B", "PL", "PT", "SIM", "UP", "RUF", "TRY", "FLY", "PERF", "FURB", "PYI", "TID", "PLC0415"
]
ignore = ["E501", "TRY003"]

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
disallow_subclassing_any = false
warn_unused_configs = true
exclude = [
    "tmp",
    ".venv",
    "venv",
    "dist",
    "build",
    ".eggs",
    "__pycache__",
    "*.egg-info",
    ".pytest_cache",
    ".git"
]

[[tool.mypy.overrides]]
module = ["torch.*", "pydantic.*", "sqlalchemy.*", "click.*"]
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = "sklearn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "matplotlib.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "seaborn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tqdm.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "fitz.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "psutil.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "boto3.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "botocore.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "questionary"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "questionary.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "rich.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "transformers.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "datasets.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "accelerate.*"
ignore_missing_imports = true

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
]