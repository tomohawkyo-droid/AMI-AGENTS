# Test Coverage Thresholds Configuration
# Used by verify_coverage.py to enforce minimum coverage levels
# TODO: Restore thresholds after adding more tests
# - Unit target: 90% (current ~21%)
# - Integration target: 75% (current ~21%)

unit:
  path: "tests/unit"
  min_coverage: 90
  source_path: "ami"

integration:
  path: "tests/integration"
  min_coverage: 75
  source_path: "ami"
