# Test Coverage Thresholds Configuration
# Used by verify_coverage.py to enforce minimum coverage levels
# - Unit target: 90%
# - Integration target: 50% (raised from ~21%, aiming for 75%)

unit:
  path: "tests/unit"
  min_coverage: 90
  source_path: "ami"

integration:
  path: "tests/integration"
  min_coverage: 50
  source_path: "ami"
