# Test Coverage Thresholds Configuration
# Used by verify_coverage.py to enforce minimum coverage levels
#
# REQUIRED THRESHOLDS (NON-NEGOTIABLE):
# - Unit: 90%
# - Integration: 75%

unit:
  path: "tests/unit"
  min_coverage: 90
  source_path: "ami"

integration:
  path: "tests/integration"
  min_coverage: 75
  source_path: "ami"
