# Banned Words Exceptions — AMI-AGENTS workspace root
# These exceptions apply only when running banned-words checks from the workspace root.

exceptions:
  # CI scripts need dict/tuple for internal caches with dynamic keys
  - pattern: '\b(Dict|Tuple|dict|tuple|frozenset)\['
    paths: ['scripts/ci/', 'types/common.py']

  # subprocess interface files need Mapping for Popen env parameter
  - pattern: '\b(Mapping|Sequence|MutableMapping|MutableSequence|Iterable|Iterator)\['
    paths: ['utils/process.py', 'cli/process_utils.py']

  # CI scripts use dict[str, Any] for parsed YAML/JSON data
  - pattern: 'dict\[.*,\s*Any\]'
    paths: ['scripts/ci/check_banned_words.py', 'scripts/ci/check_dependency_versions.py']

  # Hook manager uses dict for validator registry and event dispatch mapping
  - pattern: '\b(Dict|Tuple|dict|tuple|frozenset)\['
    paths: ['ami/hooks/manager.py']

  # HookContext NamedTuple uses tuple[ScopeOverride, ...] for immutable scope chain
  - pattern: '\b(Dict|Tuple|dict|tuple|frozenset)\['
    paths: ['ami/hooks/types.py']

  # TierClassifier uses dict/Sequence for tier configs and scope chain
  - pattern: '\b(Dict|Tuple|dict|tuple|frozenset)\['
    paths: ['ami/core/policies/tiers.py']
  - pattern: '\b(Mapping|Sequence|MutableMapping|MutableSequence|Iterable|Iterator)\['
    paths: ['ami/core/policies/tiers.py']
